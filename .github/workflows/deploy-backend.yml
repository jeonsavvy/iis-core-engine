name: deploy-backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Typecheck
        run: mypy

      - name: Syntax check (compileall)
        run: python -m compileall -q app tests

      - name: Run test suite
        run: PYTHONPATH=. pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    env:
      DEPLOY_HOST: ${{ secrets.BACKEND_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.BACKEND_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.BACKEND_DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.BACKEND_DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?BACKEND_DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?BACKEND_DEPLOY_USER is required}"
          : "${DEPLOY_SSH_KEY:?BACKEND_DEPLOY_SSH_KEY is required}"

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy and healthcheck
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=15 -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash -lc 'set -euo pipefail; cd \"${DEPLOY_PATH:-/opt/iis-core-engine}\"; git fetch --prune origin main; if git show-ref --verify --quiet refs/heads/main; then git checkout main; else git checkout -b main origin/main; fi; git pull --ff-only origin main; chmod +x scripts/deploy_remote.sh; scripts/deploy_remote.sh \"${DEPLOY_PATH:-/opt/iis-core-engine}\" main'"
